<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Ma Liste de Tâches</title>

    <link rel="stylesheet" href="style.css">

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#0d6efd">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container py-4">

    <div class="card shadow-lg">

        <div class="card-header bg-primary text-white text-center">

            <h2>📋 Ma Liste de Tâches</h2>

            <small>Simple • Rapide • Synchronisée</small>

        </div>

        <div class="card-body">

            <div class="row g-2">

                <div class="col-md-5">

                    <input
                        id="taskInput"
                        class="form-control"
                        placeholder="Nouvelle tâche...">

                </div>

                <div class="col-md-2">

                    <select id="repeatSelect" class="form-select">

                        <option value="day">Jour</option>

                        <option value="daily">Journalier</option>

                        <option value="monthly">Mensuel</option>

                        <option value="yearly">Annuel</option>

                    </select>

                </div>

                <div class="col-md-2">

                    <input
                        id="dateInput"
                        type="date"
                        class="form-control">

                </div>

                <div class="col-md-2">

                    <input
                        id="timeInput"
                        type="time"
                        class="form-control">

                </div>

                <div class="col-md-1 d-grid">

                    <button
                        class="btn btn-success"
                        onclick="addTask()">

                        Ajouter

                    </button>

                </div>

            </div>

            <hr>

            <div class="row mb-3">

                <div class="col-md-6">

                    <input
                        id="searchInput"
                        class="form-control"
                        placeholder="🔍 Rechercher..."
                        onkeyup="loadTasks()">

                </div>

                <div class="col-md-6 text-end">

                    <button class="btn btn-outline-primary" onclick="backupTasks()">

                        💾 Backup

                    </button>

                    <button class="btn btn-outline-success" onclick="importTasks()">

                        📂 Import

                    </button>

                </div>

            </div>

            <div class="mb-3">

                <button class="btn btn-secondary btn-sm" onclick="setFilter('all')">

                    Toutes

                </button>

                <button class="btn btn-secondary btn-sm" onclick="setFilter('today')">

                    Aujourd'hui

                </button>

                <button class="btn btn-secondary btn-sm" onclick="setFilter('daily')">

                    Journalier

                </button>

                <button class="btn btn-secondary btn-sm" onclick="setFilter('monthly')">

                    Mensuel

                </button>

                <button class="btn btn-secondary btn-sm" onclick="setFilter('yearly')">

                    Annuel

                </button>

                <button class="btn btn-success btn-sm" onclick="setFilter('done')">

                    Accomplies

                </button>

                <button class="btn btn-warning btn-sm" onclick="setFilter('notDone')">

                    À faire

                </button>

            </div>

            <div class="row text-center mb-3">

                <div class="col">

                    <div class="stat-box">

                        <h5 id="totalTasks">0</h5>

                        <small>Total</small>

                    </div>

                </div>

                <div class="col">

                    <div class="stat-box">

                        <h5 id="completedTasks">0</h5>

                        <small>Terminées</small>

                    </div>

                </div>

                <div class="col">

                    <div class="stat-box">

                        <h5 id="pendingTasks">0</h5>

                        <small>En attente</small>

                    </div>

                </div>

            </div>

            <div id="taskList">

            </div>

        </div>

    </div>

</div>

<input
type="file"
id="fileInput"
accept=".json"
style="display:none">

<script src="app.js"></script>

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js");

}

</script>

</body>
</html>
